<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #286bcf, #4aa3ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .contact-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      width: 90%;
      max-width: 400px;
    }

    .contact-box h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .contact-box p {
      margin: 10px 0;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: orange;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="contact-box">
    <h1>Contacto</h1>
    <p><strong>José Arocha</strong></p>

    <p>Móvil: +56 959568983</p>
    <p>Correo: jbermudez7@gmail.com</p>

    <button class="btn" onclick="goBack()">Aceptar</button>
  </div>

  <script>
    function goBack() {
      window.location.href = "index.html"; // 🔥 vuelve a tu página principal
    }
  </script>

</body>
</html>
